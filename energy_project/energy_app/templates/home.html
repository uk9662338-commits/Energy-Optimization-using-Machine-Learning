<!DOCTYPE html>
<html>
<head>
    <title>Energy Optimization</title>

    <style>

        body{
            font-family: Arial;
            background-color: #f4f4f4;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .container{
            margin-top: 100px;
        }

        h1{
            color: #2c3e50;
            font-size: 50px;
        }

        p{
            font-size: 22px;
            color: #555;
        }

        .btn{
            margin-top: 20px;
            padding: 15px 30px;
            background-color: green;
            color: white;
            border: none;
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
        }

        
        input{
    width: 300px;
    padding: 12px;
    font-size: 18px;
    border-radius: 8px;
    border: 1px solid gray;
}

        .btn:hover{
            background-color: darkgreen;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Energy Optimization System</h1>

    <p>Predict electricity usage using AI/ML</p>

    <form>

        <input type="text" placeholder="Enter Appliance Name">
        <br><br>

        <input type="number" placeholder="Usage Hours">
        <br><br>

        <input type="number" placeholder="Power Rating (Watts)">
        <br><br>

        <button class="btn">
            Predict
        </button>

    </form>

</div>

</body>
</html>
