<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>

        body{
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }

        .box{
            width: 350px;
            background: white;
            padding: 40px;
            margin: 100px auto;
            border-radius: 10px;
        }

        input{
            width: 90%;
            padding: 12px;
            margin: 10px;
        }

        button{
            padding: 12px 25px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
        }

    </style>

</head>

<body>

<div class="box">

    <h1>Energy Optimization Login</h1>

    <form action="/dashboard/">

        <input type="text" placeholder="Username">
        <br>

        <input type="password" placeholder="Password">
        <br>

        <button type="submit">
            Login
        </button>

    </form>

</div>

</body>
</html>
